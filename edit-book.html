<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Edit Book - University Library</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<nav class="navbar">
    <div class="brand">📚 University Library</div>
    <div class="nav-links">
        <a th:href="@{/admin/dashboard}">Dashboard</a>
        <a th:href="@{/admin/books}">Books</a>
        <a th:href="@{/admin/students}">Students</a>
        <a th:href="@{/admin/loans}">Loans</a>
        <a th:href="@{/logout}" style="color:#ff8a80;">Logout</a>
    </div>
</nav>

<div class="container" style="max-width:600px;">
    <h1 class="page-title">Edit Book</h1>

    <div class="card">
        <form method="post" th:action="@{/admin/books/edit/{id}(id=${book.id})}" th:object="${book}">
            <div class="form-group">
                <label>Title</label>
                <input type="text" th:field="*{title}" class="form-control" required>
            </div>
            <div class="form-group">
                <label>Author</label>
                <input type="text" th:field="*{author}" class="form-control" required>
            </div>
            <div class="form-group">
                <label>ISBN</label>
                <input type="text" th:field="*{isbn}" class="form-control" required>
            </div>
            <div class="form-group">
                <label>Category</label>
                <input type="text" th:field="*{category}" class="form-control">
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>Total Copies</label>
                    <input type="number" th:field="*{totalCopies}" class="form-control" min="0">
                </div>
                <div class="form-group">
                    <label>Available Copies</label>
                    <input type="number" th:field="*{availableCopies}" class="form-control" min="0">
                </div>
            </div>
            <div style="display:flex;gap:10px;">
                <button type="submit" class="btn btn-primary">Save Changes</button>
                <a th:href="@{/admin/books}" class="btn btn-secondary">Cancel</a>
            </div>
        </form>
    </div>
</div>

</body>
</html>

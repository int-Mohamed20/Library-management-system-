<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Register - University Library</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="auth-wrapper">
    <div class="auth-box">
        <div class="logo">📚</div>
        <h2>Create Account</h2>
        <p class="subtitle">Register as a student</p>

        <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

        <form method="post" th:action="@{/register}" th:object="${user}">
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" th:field="*{name}" class="form-control" placeholder="John Doe" required>
                <span th:if="${#fields.hasErrors('name')}" style="color:#c62828;font-size:0.82rem;"
                      th:errors="*{name}"></span>
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" th:field="*{email}" class="form-control"
                       placeholder="your@email.com" required>
                <span th:if="${#fields.hasErrors('email')}" style="color:#c62828;font-size:0.82rem;"
                      th:errors="*{email}"></span>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" th:field="*{password}" class="form-control"
                       placeholder="At least 6 characters" required>
                <span th:if="${#fields.hasErrors('password')}" style="color:#c62828;font-size:0.82rem;"
                      th:errors="*{password}"></span>
            </div>
            <button type="submit" class="btn btn-primary" style="width:100%;padding:10px;">Register</button>
        </form>

        <p style="text-align:center;margin-top:18px;font-size:0.9rem;color:#666;">
            Already have an account? <a th:href="@{/login}" style="color:#1a3c5e;font-weight:600;">Login</a>
        </p>
    </div>
</div>
</body>
</html>

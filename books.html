<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Manage Books - University Library</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<nav class="navbar">
    <div class="brand">📚 University Library</div>
    <div class="nav-links">
        <a th:href="@{/admin/dashboard}">Dashboard</a>
        <a th:href="@{/admin/books}">Books</a>
        <a th:href="@{/admin/students}">Students</a>
        <a th:href="@{/admin/loans}">Loans</a>
        <a th:href="@{/logout}" style="color:#ff8a80;">Logout</a>
    </div>
</nav>

<div class="container">
    <h1 class="page-title">Manage Books</h1>

    <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>

    <div class="card">
        <h2 style="font-size:1.05rem;margin-bottom:16px;color:#1a3c5e;">Add New Book</h2>
        <form method="post" th:action="@{/admin/books/add}" th:object="${newBook}">
            <div class="form-row">
                <div class="form-group">
                    <label>Title</label>
                    <input type="text" th:field="*{title}" class="form-control" placeholder="Book title" required>
                </div>
                <div class="form-group">
                    <label>Author</label>
                    <input type="text" th:field="*{author}" class="form-control" placeholder="Author name" required>
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>ISBN</label>
                    <input type="text" th:field="*{isbn}" class="form-control" placeholder="ISBN" required>
                </div>
                <div class="form-group">
                    <label>Category</label>
                    <input type="text" th:field="*{category}" class="form-control" placeholder="e.g. Science, Math">
                </div>
            </div>
            <div class="form-group" style="max-width:200px;">
                <label>Total Copies</label>
                <input type="number" th:field="*{totalCopies}" class="form-control" min="1" value="1" required>
            </div>
            <button type="submit" class="btn btn-primary">Add Book</button>
        </form>
    </div>

    <div class="card">
        <h2 style="font-size:1.05rem;margin-bottom:16px;color:#1a3c5e;">All Books</h2>
        <table th:if="${!books.isEmpty()}">
            <thead>
                <tr>
                    <th>Title</th>
                    <th>Author</th>
                    <th>ISBN</th>
                    <th>Category</th>
                    <th>Available</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="book : ${books}">
                    <td th:text="${book.title}"></td>
                    <td th:text="${book.author}"></td>
                    <td th:text="${book.isbn}"></td>
                    <td th:text="${book.category}"></td>
                    <td th:text="${book.availableCopies + '/' + book.totalCopies}"></td>
                    <td>
                        <a th:href="@{/admin/books/edit/{id}(id=${book.id})}" class="btn btn-secondary btn-sm">Edit</a>
                        <form method="post"
                              th:action="@{/admin/books/delete/{id}(id=${book.id})}"
                              style="display:inline;"
                              onsubmit="return confirm('Delete this book?')">
                            <button type="submit" class="btn btn-danger btn-sm">Delete</button>
                        </form>
                    </td>
                </tr>
            </tbody>
        </table>
        <div th:if="${books.isEmpty()}" class="empty-state">
            <div class="icon">📖</div>
            <p>No books added yet</p>
        </div>
    </div>
</div>

</body>
</html>

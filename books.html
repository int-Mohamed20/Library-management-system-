<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Browse Books - University Library</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<nav class="navbar">
    <div class="brand">📚 University Library</div>
    <div class="nav-links">
        <a th:href="@{/student/home}">Home</a>
        <a th:href="@{/student/books}">Browse Books</a>
        <a th:href="@{/student/history}">My Borrows</a>
        <a th:href="@{/student/profile}">Profile</a>
        <a th:href="@{/logout}" style="color:#ff8a80;">Logout</a>
    </div>
</nav>

<div class="container">
    <h1 class="page-title">Browse Books</h1>

    <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

    <form method="get" th:action="@{/student/books}" class="search-bar">
        <input type="text" name="search" th:value="${search}" placeholder="Search by title or author...">
        <button type="submit" class="btn btn-primary">Search</button>
        <a th:href="@{/student/books}" class="btn btn-secondary">Clear</a>
    </form>

    <div class="books-grid" th:if="${!books.isEmpty()}">
        <div class="book-card" th:each="book : ${books}">
            <div class="book-title" th:text="${book.title}"></div>
            <div class="book-author" th:text="'by ' + ${book.author}"></div>
            <div class="book-category" th:text="${book.category}"></div>
            <div class="copies"
                 th:classappend="${book.availableCopies == 0 ? 'none' : ''}"
                 th:text="${book.availableCopies} + ' / ' + ${book.totalCopies} + ' available'"></div>
            <form method="post" th:action="@{/student/borrow/{id}(id=${book.id})}"
                  style="margin-top:8px;">
                <button type="submit" class="btn btn-success btn-sm"
                        th:disabled="${book.availableCopies == 0}">
                    <span th:if="${book.availableCopies > 0}">Borrow</span>
                    <span th:if="${book.availableCopies == 0}">Unavailable</span>
                </button>
            </form>
        </div>
    </div>

    <div th:if="${books.isEmpty()}" class="empty-state">
        <div class="icon">🔍</div>
        <p>No books found</p>
    </div>
</div>

</body>
</html>
